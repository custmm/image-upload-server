<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;">

    <meta name="google-site-verification" content="kMxKqlA9cKbHdJGw51M2sE21fjyzL3SvY1ryWISJMT0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ɐ퓨챠휼Ɐ >> 관리자페이지</title>

    <!-- 외부 링크 css -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- 파일 내 css -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/mobile.css">
</head>

<body class="dashboard-page no-bg">

    <div class="adminbar-container">
        <div class="left-section">
            <button class="back-button" onclick="window.location.href='mode-selection.html'">뒤로가기</button>
        </div>
        <h1>Dashboard</h1>
    </div>

    <div id="devide">
        <div id="left_wrap">
            <div class="section1">
                <div class="section-header">
                    <h2 class="section-title">게시물 정보</h2>
                    <div class="change-button-group">
                        <button class="change-button" id="text-mode">
                            <i class="fas fa-file-alt"></i>
                        </button>

                    </div>
                </div>
                <div class="post-form-container">
                </div>
                <button id="loadToggleBtn" style="display:none"></button>
            </div>
        </div>

        <div id="right_wrap">
            <div class="section2">
                <div class="section-header">
                    <h2 class="section-title">관리자용 버튼</h2>
                </div>
                <div class="util-group">
                    <button id="image-mode" class="custom-button" >이미지모드로 보기</button>
                    <button id="edit" class="custom-button">레이아웃 변경</button>
                    <button id="pdf" class="custom-button">데이터 다운로드</button>
                    <button id="check-duplicate" class="custom-button">게시글 중복 확인</button>
                </div>
            </div>

            <div class="section3">
                <div class="section-header">
                    <h2 class="section-title">이미지 표시기</h2>
                </div>
                <div class="function-container">
                    <div class="sorting-wrapper">
                        <img src="images/indicator/preview-gunff_1re.png" alt="Preview 1">
                        <img src="images/indicator/preview-gunff_2re.png" alt="Preview 2">
                        <img src="images/indicator/preview-gunff_3re.png" alt="Preview 3">
                        <img src="images/indicator/preview-gunff_4re.png" alt="Preview 4">
                        <img src="images/indicator/preview-gunff_5re.png" alt="Preview 5">
                        <img src="images/indicator/preview-gunff_6re.png" alt="Preview 6">
                        <img src="images/indicator/preview-gunff_7re.png" alt="Preview 7">
                        <img src="images/indicator/preview-gunff_8re.png" alt="Preview 8">
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="section-row">
        <div class="section-header">
            <h2 class="section-title">게시물 비율</h2>
        </div>
        <div class="post-chart-container">
            <div class="chart-area" id="chartArea">
                <div class="chart-wrapper" id="donutWrapper">
                    <canvas id="donutChart"></canvas>
                </div>
                <div class="chart-wrapper" id="barWrapper" style="display: none;">
                    <canvas id="radarChart"></canvas>
                    <canvas id="lineChart" style="position: absolute; top: 0; left: 0; display: none;"></canvas>
                </div>
                <div id="chart-controls">
                    <button id="showDonut" class="custom-chart-button" style="padding: 2px 10px;">도넛 차트</button>
                    <button id="showRadar" class="custom-chart-button" style="padding: 2px 10px;">버블 차트</button>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingIndicator" class="loading-indicator">
        <div class="loader loader1" id="mainLoader">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
        <p class="loading-text">기다려주세요...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/admin-dashboard.js"></script>

</body>

</html>
