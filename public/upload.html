<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="kMxKqlA9cKbHdJGw51M2sE21fjyzL3SvY1ryWISJMT0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ɐ퓨챠휼Ɐ >>이미지 업로드</title>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/mobile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="upload-page">
    <button class="back-button" onclick="window.location.href='mode-selection.html'">뒤로가기</button>
    <h1>이미지 업로드</h1>
    <div class="upload-container">
        <div class="preview-container" id="previewContainer">
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="category_container">
            <div class="cat_name">
                <h3>카테고리 선택:</h3>
                <select name="big_cat" id="category">
                    <option value="puzzle">퍼즐</option>
                    <option value="bizz">보석비즈</option>
                    <option value="solidbodypuzzle">3D퍼즐</option>
                    <option value="deforme">디폼블럭</option>
                    <option value="brickfigure">브릭피규어</option>
                </select>
            </div>

            <div class="cat_name">
                <h3>서브카테고리 선택:</h3>
                <select name="small_cat" id="subcategory"></select>
            </div>
        </div>

        <hr>
        <h2>제목</h2>
        <input type="text" id="title_name">
        <h3>설명란</h3>
        <div class="description-container">
            <div class="editor-buttons">
                <button onclick="formatText('bold')"><i class="fas fa-bold"></i></button>
                <button onclick="formatText('strikethrough')"><i class="fas fa-strikethrough"></i></button>
            </div>
            <!-- 점선 구분선 추가 -->
            <hr class="dashed-line">
            <div id="descriptionEditor" contenteditable="true" class="text-editor"></div>
            
            <div class="source">
                <input type="text" id="source_url" placeholder="텍스트 출처 링크를 입력하세요">
            </div>

            <p style="display: flex; justify-content: space-between; width: 100%;">
                <span id="hashtagDisplay" style="font-size: 14px; color: #333;"></span>
                <span id="descriptionCounter">0 / 1000</span>
            </p> <!-- 글자 수 표시 -->
        </div>
        <button id="uploadButton" class="upload-button">업로드</button>
    </div>
    <div id="loadingIndicator" class="loading-indicator">
        <div class="loader loader1" id="mainLoader">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
        <p class="loading-text">업로드 중...</p>
    </div>
    <script>
        // 글꼴 효과 적용 함수
        function formatText(command) {
            document.execCommand(command, false, null);
        }
    </script>
    <script src="js/client.js"></script>
</body>

</html>
