<html lang="ko">

<head>
    <meta charset="UTF-8">

    <title>Ɐ퓨챠휼Ɐ >> 로그인</title>

    <!-- 외부 링크 css -->

    <!-- 파일 내 css -->

<body class="login-page">
    <button class="back-button" onclick="window.location.href='index.html'">뒤로가기</button>
    <div class="login-container">
        <h1>관리자 로그인</h1>
        <form id="loginForm" style="text-align: center;">
            <div class="login-row">
                <div class="floating-input">
                    <input type="password" id="password" required>
                    <label for="password">관리자 암호</label>
                </div>
                <button id="loginButton" type="submit">로그인</button>
            </div>
            <p id="error-message"></p>
        </form>
    </div>
    <div id="loadingIndicator" class="loading-indicator">
        <div class="loader loader1" id="mainLoader">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
        <p class="loading-text">로그인 중...</p>
    </div>
    <script src="js/admin-login.js"></script>
</body>

</html>
