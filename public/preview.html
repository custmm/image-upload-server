<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="google-site-verification" content="kMxKqlA9cKbHdJGw51M2sE21fjyzL3SvY1ryWISJMT0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ɐ휴욱슈욱Ɐ >> 업로드된 이미지</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/component.css">
  <link rel="stylesheet" href="./css/global.css">
  <style>
    @media (max-width :576px) {
      body.preview-page #welcomeMessage {
        font-size: 25px;
      }

      body.preview-page .toggle-switch {
        top: 10px;
        right: 55px;
        height: 30px;
        width: 80px;
      }

      body.preview-page .toggle-switch input:checked+.slider::before {
        transform: translateX(48px);
      }

      body.preview-page .toggle-switch input:checked+.slider #themeIcon {
        transform: translateX(48px);
      }

      body.preview-page #themeIcon {
        width: 23px;
        height: 36px;
      }

      body.preview-page #opacitySlider {
        width: 85px;
      }

      body.preview-page #currentCategory {
        font-size: 23px;
      }

      body.preview-page .view-icon-btn {
        width: 30px;
        height: 30px;
      }

      body.preview-page .view-icon-btn i {
        font-size: 14px;
      }

      body.preview-page .view-switch {
        margin: 10px 0 10px 70%;
      }

      body.preview-page .sub-tab-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        gap: 5px;
        margin-top: 10px;

      }

      body.preview-page .image-gallery-wrapper {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        height: auto;
        margin: 20px auto;
        width: 95%;
        overflow-x: hidden;

      }

      body.preview-page .sidebar {
        padding: 100px 31.5% 0 31.5%;

      }

      body.preview-page .infor-popup,
      body.preview-page .app-infor-popup {
        width: 95%;
        max-height: 90vh;
        overflow: auto;
        padding: 18px 16px;
        font-size: 11px;
        box-sizing: border-box;
      }

      body.preview-page .app-infor-popup table {
        width: 100%;
        word-break: break-word;
        font-size: 11px;
      }

      body.preview-page .app-infor-popup td,
      body.preview-page .app-infor-popup th {
        padding: 4px 6px;
        /* 표 셀 간격도 줄이기 */
      }

      body.preview-page .sub-tab {
        font-size: 10px;
        padding: 4px 4px;
      }

      body.preview-page .opacitybtn {
        height: 20px;
        cursor: pointer;
      }

      body.preview-page .preview-images {
        position: absolute;
        display: flex;
        top: -105px;
        right: 10px;
        cursor: grab;
        align-items: center;
        margin-left: 80%;
      }

      body.preview-page .preview-images img {
        display: block;
        width: auto;
        height: 65px;
        border-radius: 5px;
        object-fit: cover;
        transition: transform 0.3s ease;
        z-index: 9999;
      }
    }
  </style>
</head>

<body class="preview-page dark-mode">

  <!-- ✅ 상단 메뉴 바 -->
  <header class="menubar-container">
    <button class="back-button"
      onclick="window.location.href= location.hash.includes('explan') ? 'click.html' :'index.html'">뒤로가기
    </button>

    <button class="sidebar-toggle" onclick="toggleSidebar()">
      <span style="color: #a0a0a0; font-size: 30px;">&#9776;</span>
    </button>
  </header>

  <!-- ✅ 사이드 네비게이션 -->
  <nav id="sidebar" class="sidebar">
    <button class="close-sidebar" onclick="toggleSidebar()">✖</button>

    <ul class="main-menu">
      <li class="menu-item">
        <button class="menu-title" onclick="toggleMenu('board')">게시판</button>
        <ul id="board" class="sub-menu">
          <li><a href="#" onclick="goCategory('퍼즐')">퍼즐</a></li>
          <li><a href="#" onclick="goCategory('보석비즈')">보석비즈</a></li>
          <li><a href="#" onclick="goCategory('입체퍼즐')">입체퍼즐</a></li>
          <li><a href="#" onclick="goCategory('디폼블럭')">디폼블럭</a></li>
          <li><a href="#" onclick="goCategory('브릭피규어')">브릭피규어</a></li>
        </ul>
      </li>

      <li class="menu-item">
        <button class="menu-title" onclick="toggleMenu('etc')">
          부가기능</button>
        <ul id="etc" class="sub-menu">
          <li><a href="click.html">숨겨진기능 체험하기</a></li>
          <li><a href="killing_game.html">게임하기</a></li>
          <li>
            <a href="./ai_icon.html" id="iconlink">아이콘 스튜디오</a>
          </li>
        </ul>
      </li>
    </ul>
  </nav>
  <!-- ✅ 메인 콘텐츠 영역 -->
  <main>

    <!-- 기능 제어 영역 -->
    <section class="function-infor">
      <div class="message-container">
        <a href="click.html" id="welcomeMessage">어서오세요</a>
      </div>

      <div class="opacityControl" id="opacityControl">
        <label for="opacitySlider"></label>
        <input type="range" id="opacitySlider" min="0.2" max="1" step="0.025" value="0.825">
        <img class="opacitybtn" id="opacityToggleBtn" src="images/toggle_leaf.png" alt="Toggle Opacity Slider">
      </div>

      <div class="toggle-switch">
        <input type="checkbox" id="themeToggle" onclick="toggleTheme()">
        <label class="slider" for="themeToggle">
          <span id="themeIcon"></span>
        </label>
      </div>
    </section>

    <!-- 로딩 상태 -->
    <section id="loadingIndicator" class="loading-indicator">
      <img src="images/loading.gif" alt="로딩 중..." class="loading-image">
      <p class="loading-text">로딩 중...</p>
    </section>

    <!-- 메인 카테고리 탭 (큰 카테고리) -->
    <section class="tab-design">
      <div class="tab-container">

        <button class="tab-btn active" data-category="퍼즐">
          퍼즐
          <i data-lucide="puzzle" class="tab-icon"></i>
        </button>

        <button class="tab-btn" data-category="보석비즈">
          보석비즈
          <i data-lucide="gem" class="tab-icon"></i>
        </button>

        <button class="tab-btn" data-category="입체퍼즐">
          입체퍼즐
          <i data-lucide="box" class="tab-icon"></i>
        </button>

        <button class="tab-btn" data-category="디폼블럭">
          디폼블럭
          <i data-lucide="grid-3x3" class="tab-icon"></i>
        </button>

        <button class="tab-btn" data-category="브릭피규어">
          브릭피규어
          <i data-lucide="toy-brick" class="tab-icon"></i>
        </button>

      </div>
    </section>

    <!-- 프리뷰 이미지 컨테이너 -->
    <section class="preview-images" id="previewImagesContainer"></section>

    <!-- 서브 카테고리 + 갤러리 -->
    <section class="marge-container" id="marge-container">

      <header class="category-subtab-container">
        <h2 id="currentCategory"></h2>

        <div class="sub-tab-wrapper">
          <div class="sub-tab-container" id="subTabContainer"></div>

          <div class="view-switch">
            <button id="preview-image-mode" class="view-icon-btn active">
              <i class="fas fa-th-large"></i>
            </button>
            <button id="preview-text-mode" class="view-icon-btn">
              <i class="fas fa-list"></i>
            </button>
          </div>
        </div>
      </header>

      <section class="image-gallery-wrapper">
        <div id="imageGallery" class="image-gallery">
        </div>
      </section>

      <nav id="pagination-container"></nav>
    </section>
  </main>

  <!-- ✅ 미리보기 팝업 -->
  <dialog id="previewOverlayInfo" class="preview-overlay" style="display:none;">
    <div class="preview-popup">
      <button class="preview-close" onclick="closePreviewPopup()">✖</button>

      <iframe id="previewFrameInfo" src="./preview_popup.html" loading="lazy"></iframe>
    </div>
  </dialog>

  <dialog id="previewOverlayIcon" class="preview-overlay" style="display:none;">
    <div class="preview-popup">
      <button class="preview-close" onclick="closePreviewPopup()">✖</button>

      <iframe id="previewFrameIcon" src="./ai_icon.html" loading="lazy"></iframe>
    </div>
  </dialog>

  <!-- ✅ 푸터 -->
  <footer class="page-footer">
    <p>같은 유형의 물체 설명이 반복될 수 있습니다.<br>© 2025 휴욱슈욱 All rights reserved.</p>
    <p>
      <a href="./preview_popup.html" id="previewLink">소개</a> |
      <a href="https://github.com/custmm/image-upload-server" target="_blank">GitHub</a> |
      <a href="mailto:xx00bki924@gmail.com?subject=피드백 문의합니다.">Contact</a>
    </p>
  </footer>

  <script src="js/preview.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</body>

</html>
