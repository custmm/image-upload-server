<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="google-site-verification" content="kMxKqlA9cKbHdJGw51M2sE21fjyzL3SvY1ryWISJMT0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ɐ퓨챠휼Ɐ >> 게시물</title>

  <!-- 외부 링크 css -->
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- 파일 내 css -->
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/component.css">
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/mobile.css">

</head>

<body class="post-page">
  <div class="ptitle">
    <h1>게시물</h1>
    <button id="picture">
      <img src="images/toggle/draw-tool.png" alt="그리기">
    </button>

    <!-- 다크 모드 토글 스위치 -->
    <div class="toggle-switch">
      <input type="checkbox" id="themeToggle" onclick="toggleTheme()">
      <label class="slider_util" for="themeToggle">
        <span id="themeIcon"></span>
      </label>
    </div>
  </div>

  <!-- 그림 그리기 팝업 -->
  <div id="drawing-popup" class="drawing-popup">
    <div class="popup-header">
      <div class="popup-title">그리기</div>
      <button id="close-drawing" class="close-popup">✖</button>
    </div>
    <canvas id="drawingCanvas"></canvas>
    <div class="popup-footer">
      <button id="clearCanvas">지우기</button>
    </div>
  </div>

  <div id="loadingIndicator" class="loading-indicator">
    <div class="loader loader1" id="mainLoader">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>

    <p class="loading-text">게시물을 불러오는 중...</p>
  </div>

  <div class="post-container">
    <img id="postImage" class="post-image" src="" alt="게시물 이미지">
    <!-- 카테고리 & 서브카테고리 표시 공간 추가 -->
    <div class="postcategory-container">
      <div class="post-category">
        <span id="postCategory" class="clickable-category"></span> ▶ <span id="postSubcategory"></span>
      </div>
    </div>

    <i id="postTitle" class="post-title"></i>

    <div class="post-desc">
      <p id="postDescription" class="post-description"></p>
      <div class="hastag">
      </div>


    </div>
    <!-- 버튼 추가 -->
    <div class="post-buttons">
      <button id="prevPostButton" class="icon-button" title="이전 글">
        <i class="fa-solid fa-chevron-left"></i>
      </button>

      <button id="nextPostButton" class="icon-button" title="다음 글">
        <i class="fa-solid fa-chevron-right"></i>
      </button>

      <button id="backToListButton" class="icon-button">
        <i class="fa-solid fa-list"></i>
      </button>

      <button id="shareButton" class="icon-button">
        <i class="fa-solid fa-share-nodes"></i>
      </button>
    </div>
  </div>


  <!-- 팝업 메시지 컨테이너 -->
  <div id="popupMessage" class="popup-message" style="display: none;">
    <p id="popupText"></p>
    <button class="popup-button" onclick="closePopup()">확인</button>
  </div>


  <footer class="page-footer">
    <p>같은 유형의 물체 설명이 반복될 수 있습니다.<br>© 2025 퓨챠휼 All rights reserved.</p>

  </footer>
  <script src="js/post.js"></script>
</body>

</html>
