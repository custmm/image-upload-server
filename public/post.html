<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="google-site-verification" content="kMxKqlA9cKbHdJGw51M2sE21fjyzL3SvY1ryWISJMT0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ɐ휴욱슈욱Ɐ >> 게시물</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/component.css">
  <link rel="stylesheet" href="./css/global.css">
  <style>
    @media (max-width: 576px) {
      body.post-page .post-container {
        display: flex;
        background-color: #ffffff;
        border-radius: 10px;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        padding: 15px;
        width: 90%;
        margin: 20px auto;
      }

      body.post-page .toggle-switch {
        top: 10px;
        right: 55px;
        height: 30px;
        width: 80px;
      }

      body.post-page .toggle-switch input:checked+.slider::before {
        transform: translateX(48px);
      }

      body.post-page .toggle-switch input:checked+.slider #themeIcon {
        transform: translateX(48px);
      }

      body.post-page #themeIcon {
        width: 23px;
        height: 36px;
      }

      body.post-page .post-description {
        font-size: 12px;
      }

      body.post-page .postcategory-container {
        flex-direction: column;
        /* 좁은 화면에서 세로 정렬 */
        gap: 5px;
        text-align: center;
      }

      body.post-page .button {
        width: 100%;
        /* 버튼도 꽉 차게 */
        max-width: 300px;
        margin: 5px auto;
      }
    }
  </style>
</head>

<body class="post-page">
  <div class="ptitle">
    <h1>게시물</h1>
    <button id="picture">
      <img src="images/draw-tool.svg" alt="그리기">
    </button>
    
    <!-- 다크 모드 토글 스위치 -->
    <div class="toggle-switch">
      <input type="checkbox" id="themeToggle" onclick="toggleTheme()">
      <label class="slider_util" for="themeToggle">
        <span id="themeIcon"></span>
      </label>
    </div>
  </div>

  <!-- 그림 그리기 팝업 -->
  <div id="drawing-popup" class="drawing-popup">
    <div class="popup-header">
      <div class="popup-title">그리기</div>
      <button id="close-drawing" class="close-popup">✖</button>
    </div>
    <canvas id="drawingCanvas"></canvas>
    <div class="popup-footer">
      <button id="clearCanvas">지우기</button>
    </div>
  </div>

  <div id="loadingIndicator" class="loading-indicator">
    <div class="loader loader1" id="mainLoader">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>

    <p class="loading-text">게시물을 불러오는 중...</p>
  </div>

  <div class="post-container">
    <img id="postImage" class="post-image" src="" alt="게시물 이미지">
    <!-- 카테고리 & 서브카테고리 표시 공간 추가 -->
    <div class="postcategory-container">
      <div class="post-category">
        <span id="postCategory" class="clickable-category"></span> ▶ <span id="postSubcategory"></span>
      </div>
    </div>

    <i id="postTitle" class="post-title"></i>

    <div class="post-desc">
      <p id="postDescription" class="post-description"></p>
      <div class="hastag">
      </div>


    </div>
    <!-- 버튼 추가 -->
    <div class="post-buttons">
      <button id="backToListButton" class="icon-button">
        <i class="fa-solid fa-list"></i>
      </button>

      <button id="shareButton" class="icon-button">
        <i class="fa-solid fa-share-nodes"></i>
      </button>
    </div>
  </div>


  <!-- 팝업 메시지 컨테이너 -->
  <div id="popupMessage" class="popup-message" style="display: none;">
    <p id="popupText"></p>
    <button class="popup-button" onclick="closePopup()">확인</button>
  </div>


  <footer class="page-footer">
    <p>같은 유형의 물체 설명이 반복될 수 있습니다.<br>© 2025 휴욱슈욱 All rights reserved.</p>

  </footer>
  <script src="js/post.js"></script>
</body>

</html>
