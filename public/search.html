<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ɐ퓨챠휼Ɐ >> 결과 확인</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/mobile.css">
</head>

<body class="search-page">
  <div class="search-header">
    <button class="back-button">뒤로가기</button>
    <div class="search-title">
      <h2 id="resultTitle">결과를 불러오는 중...</h2>
    </div>
    <button id="resetTagButton" style="display: none;">전체 태그보기</button>
  </div>

  <div id="loadingIndicator" class="loading-indicator">
    <div class="loader loader1" id="mainLoader">
      <div></div><div></div><div></div><div></div>
      <div></div><div></div><div></div><div></div>
    </div>
    <p class="loading-text">게시물을 불러오는 중...</p>
  </div>

  <div class="tag_post" id="koreanTagList"></div>

  <div class="search-container">
    <ul class="post-list" id="postList">
      </ul>
  </div>

  <div id="scrollTrigger" style="height: 1px;"></div>

  <script src="js/search_integrated.js"></script>
</body>
</html>
